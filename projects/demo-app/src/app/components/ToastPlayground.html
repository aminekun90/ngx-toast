<div class="playground-card">
    <h2>⚙️ Toast Builder</h2>
    <div class="playground-layout">
        <div class="form-section">
            <div class="form-grid">
                <div class="form-group">
                    <label for="title">Title</label>
                    <input type="text" id="title" [(ngModel)]="toastTitle" class="form-control">
                </div>
                <div class="form-group">
                    <label for="message">Message</label>
                    <textarea id="message" [(ngModel)]="toastMessage" class="form-control" rows="2"></textarea>
                </div>
                <div class="form-group">
                    <label for="type">Type</label>
                    <select id="type" [(ngModel)]="toastType" class="form-control">
                        <option value="success">Success</option>
                        <option value="error">Error</option>
                        <option value="info">Info</option>
                        <option value="warning">Warning</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="position">Position</label>
                    <select id="position" [(ngModel)]="toastPosition" class="form-control">
                        <option value="top-right">Top Right</option>
                        <option value="top-left">Top Left</option>
                        <option value="top-center">Top Center</option>
                        <option value="bottom-right">Bottom Right</option>
                        <option value="bottom-left">Bottom Left</option>
                        <option value="bottom-center">Bottom Center</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="duration">Duration (ms)</label>
                    <input id="duration" type="number" [(ngModel)]="toastDuration" class="form-control" step="1000">
                </div>
                <div class="form-group checkbox-group">
                    <label class="checkbox-label">
                        <input type="checkbox" [(ngModel)]="toastProgressBar">
                        <span>Show Progress bar</span>
                    </label>
                </div>
            </div>
            <button class="btn-launch" (click)="showCustomToast()">🚀 Try me!</button>
        </div>

        <div class="code-preview-section">
            <h3>TypeScript</h3>
            <div class="code-block-wrapper">
                <button class="btn-copy" (click)="copyCode(tsCode(), 'ts')" [class.copied]="copiedTs()">
                    {{ copiedTs() ? 'Copied ! ✅' : 'Copy' }}
                </button>
                <pre class="language-typescript"><code [innerHTML]="highlightedTsCode()"></code></pre>
            </div>

            <h3>HTML</h3>
            <div class="code-block-wrapper">
                <button class="btn-copy" (click)="copyCode(htmlCode(), 'html')" [class.copied]="copiedHtml()">
                    {{ copiedHtml() ? 'Copied ! ✅' : 'Copy' }}
                </button>
                <pre class="language-markup"><code [innerHTML]="highlightedHtmlCode()"></code></pre>
            </div>
        </div>
    </div>
</div>
