<div class="playground-card">
    <h2>⚙️ Toast Builder</h2>

    <div class="playground-layout">
        <!-- Colonne Gauche : Formulaire -->
        <div class="form-section">
            <div class="form-grid">
                <div class="form-group">
                    <label for="title">Titre</label>
                    <input type="text" id="title" [(ngModel)]="toastTitle" class="form-control" placeholder="Titre du toast">
                </div>

                <div class="form-group">
                    <label for="message">Message</label>
                    <textarea id="message" [(ngModel)]="toastMessage" class="form-control"
                        placeholder="Message du toast" rows="2"></textarea>
                </div>

                <div class="form-group">
                    <label for="type">Type</label>
                    <select title="Toast Type" id="type" [(ngModel)]="toastType" class="form-control">
                        <option value="success">Success</option>
                        <option value="error">Error</option>
                        <option value="info">Info</option>
                        <option value="warning">Warning</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="position">Position</label>
                    <select id="position" title="Toast Position" [(ngModel)]="toastPosition" class="form-control">
                        <option value="top-right">Top Right</option>
                        <option value="top-left">Top Left</option>
                        <option value="bottom-right">Bottom Right</option>
                        <option value="bottom-left">Bottom Left</option>
                        <option value="top-center">Top Center</option>
                        <option value="bottom-center">Bottom Center</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="duration">Duration (ms)</label>
                    <input title="Duration" id="duration" type="number" [(ngModel)]="toastDuration" class="form-control"
                        step="1000" min="0">
                </div>

                <div class="form-group checkbox-group">
                    <label class="checkbox-label">
                        <input type="checkbox" [(ngModel)]="toastProgressBar">
                        <span>Show Progress Bar</span>
                    </label>
                </div>
            </div>

            <button class="btn-launch" (click)="showCustomToast()">
                🚀 Try me !
            </button>
        </div>

        <!-- Colonne Droite : Aperçu du Code -->
        <div class="code-preview-section">
            <h3>TypeScript</h3>
            <div class="code-block-wrapper">
                <button class="btn-copy" (click)="copyCode(tsCode(), 'ts')" [class.copied]="copiedTs()">
                    {{ copiedTs() ? 'Copied! ✅' : 'Copy' }}
                </button>
                <pre><code class="language-typescript" [innerHTML]="highlightedTsCode()"></code></pre>
            </div>

            <h3>HTML</h3>
            <div class="code-block-wrapper">
                <button class="btn-copy" (click)="copyCode(htmlCode(), 'html')" [class.copied]="copiedHtml()">
                    {{ copiedHtml() ? 'Copied! ✅' : 'Copy' }}
                </button>
                <pre><code class="language-html" [innerHTML]="highlightedHtmlCode()"></code></pre>
            </div>
        </div>
    </div>
</div>
