name: Test

on:
  push:
    paths-ignore:
      - "docs/**"
      - "README.md"
      - "LICENSE"
      - ".editorconfig"
    branches: [main, master]
  pull_request:
    paths-ignore:
      - "docs/**"
      - "README.md"
      - "LICENSE"
      - ".editorconfig"
    branches: [main, master]

permissions:
  contents: read

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        node: [22.x, 24.x, 25.x]

    steps:
      - name: ⬇️ Checkout repository
        uses: actions/checkout@v6

      - name: ⚙️ Enable Corepack
        run: corepack enable

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: "yarn"

      - name: 📦 Install dependencies
        shell: bash
        run: yarn install --immutable

      - name: 🎭 Install Playwright Browsers
        run: npx playwright install chromium --with-deps

      - name: 🏗️ Build libraries
        shell: bash
        run: |
          yarn build:ng
          cd projects/react-toast && yarn build

      - name: 🧪 Run tests
        shell: bash
        run: |
          # Tests Angular
          yarn ng test @aminekun90/ngx-toast --watch=false
          # Ajoute ici tes tests React quand ils seront prêts
          cd projects/react-toast && yarn test

      - name: 🛡️ Security Audit (Linux only)
        if: matrix.os == 'ubuntu-latest' && success()
        shell: bash
        run: |
          if [ -f "./shai-hulud-audit.sh" ]; then
            chmod +x ./shai-hulud-audit.sh
            ./shai-hulud-audit.sh --no-color --save-report || true
          else
            echo "Audit script not found, skipping."
          fi
        continue-on-error: true

      - name: 📤 Upload security audit report
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: security-audit-node${{ matrix.node }}-${{ github.run_number }}
          path: "*.log"
          retention-days: 7