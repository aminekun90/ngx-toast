name: Release & Publish

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g., 1.0.5) - Leave empty to use root package.json'
        required: false
        type: string

permissions:
  contents: write
  packages: write
  issues: write
  id-token: write

jobs:
  release:
    name: 🚀 Build, Audit & Release
    runs-on: ubuntu-latest
    environment:
      name: npm-publish

    steps:
      - name: ⬇️ Checkout Repo
        uses: actions/checkout@v6

      - name: Enable Corepack 
        run: corepack enable

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24.x"
          cache: "yarn"
          registry-url: "https://registry.npmjs.org"
      
      - name: ⬆️ Ensure Latest npm # Mandatory never forgetti MOM SPAGHETTI
        run: npm install -g npm@latest
      
      # 1. Récupération de la version
      - name: 🆔 Get Package Info
        id: package
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION=$(node -p "require('./package.json').version")
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "📦 Target Version: $VERSION"

      # 2. Installation et Build des Librairies (Angular + React)
      - name: 🛠️ Install & Build Libraries
        run: |
          yarn install --immutable
          yarn build  # Ton script global: prebuild + build:ng + build:react

      - name: 🛡️ Run Shai-Hulud Audit
        shell: bash
        run: |
          chmod +x ./shai-hulud-audit.sh
          ./shai-hulud-audit.sh --no-color --save-report || true

      # 3. Publication sur NPM (Public) avec OIDC
      - name: 🚀 Publish to NPM
        run: |
          VERSION="${{ steps.package.outputs.version }}"
          
          # Angular
          PKG_NG="@aminekun90/ngx-toast"
          if npm view "$PKG_NG@$VERSION" > /dev/null 2>&1; then
            echo "✅ $PKG_NG@$VERSION already exists on npm, skipping publish."
          else
            echo "🚀 Publishing $PKG_NG@$VERSION to npm..."
            npm publish ./dist/ngx-toast --provenance --access public --ignore-scripts
          fi

          # React
          PKG_REACT="@aminekun90/react-toast"
          if npm view "$PKG_REACT@$VERSION" > /dev/null 2>&1; then
            echo "✅ $PKG_REACT@$VERSION already exists on npm, skipping publish."
          else
            echo "🚀 Publishing $PKG_REACT@$VERSION to npm..."
            npm publish ./projects/react-toast --provenance --access public --ignore-scripts
          fi

      # 4. Release GitHub
      - name: 🏷️ Create GitHub Release
        if: success()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.package.outputs.version }}
        run: |
          if gh release view "v$VERSION" >/dev/null 2>&1; then
            echo "✅ GitHub release v$VERSION déjà existante."
          else
            gh release create "v$VERSION" --title "v$VERSION" --generate-notes --target "main"
          fi

      # 5. Publication sur GitHub Packages
      - name: 📦 Publish to GitHub Packages
        if: success()
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.package.outputs.version }}"
          REGISTRY="https://npm.pkg.github.com"

          npm config set @aminekun90:registry $REGISTRY
          npm config set //npm.pkg.github.com/:_authToken "${NODE_AUTH_TOKEN}"

          # Angular
          PKG_NG="@aminekun90/ngx-toast"
          if npm view "$PKG_NG@$VERSION" --registry $REGISTRY > /dev/null 2>&1; then
            echo "✅ $PKG_NG@$VERSION already exists on GitHub Packages, skipping publish."
          else
            echo "🚀 Publishing $PKG_NG@$VERSION to GitHub Packages..."
            npm publish ./dist/ngx-toast --registry $REGISTRY --ignore-scripts
          fi

          # React
          PKG_REACT="@aminekun90/react-toast"
          if npm view "$PKG_REACT@$VERSION" --registry $REGISTRY > /dev/null 2>&1; then
            echo "✅ $PKG_REACT@$VERSION already exists on GitHub Packages, skipping publish."
          else
            echo "🚀 Publishing $PKG_REACT@$VERSION to GitHub Packages..."
            npm publish ./projects/react-toast --registry $REGISTRY --ignore-scripts
          fi

      # 6. Build des DEMOS
      - name: 🌍 Build Demos (Angular & React)
        run: |
          # Build Angular Demo
          yarn ng build demo-app --configuration production --base-href=/ngx-toast/
          
          # Build React Demo (on précise la base pour GitHub Pages)
          yarn workspace demo-react vite build --base=/ngx-toast/react/
          
          # Préparation du dossier final pour GitHub Pages
          # On déplace la démo React dans un sous-dossier de la démo Angular
          mkdir -p ./dist/demo-app/browser/react
          cp -r ./dist/demo-react/* ./dist/demo-app/browser/react/

      # 7. Déploiement groupé sur GitHub Pages
      - name: 🚀 Deploy to GitHub Pages
        if: success()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist/demo-app/browser
          publish_branch: gh-pages