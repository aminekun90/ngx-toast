name: Release & Publish

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g., 1.0.1) - Leave empty to use lib package.json'
        required: false
        type: string

permissions:
  contents: write
  packages: write
  issues: write
  id-token: write

jobs:
  release:
    name: 🚀 Build, Audit & Release
    runs-on: ubuntu-latest
    environment:
      name: npm-publish

    steps:
      - name: ⬇️ Checkout Repo
        uses: actions/checkout@v6

      - name: Enable Corepack 
        run: corepack enable

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22.x"
          cache: "yarn"
          registry-url: "https://registry.npmjs.org"

      - name: ⬆️ Ensure Latest npm
        run: npm install -g npm@latest

      # 1. On récupère la version depuis le dossier de la LIB
      - name: 🆔 Get Package Info
        id: package
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION=$(node -p "require('./projects/ngx-toast/package.json').version")
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "📦 Target Version: $VERSION"

      # 2. Build explicite
      - name: 🛠️ Install & Build
        run: |
          yarn install --immutable
          yarn ng build @aminekun90/ngx-toast --configuration production

      - name: 🛡️ Run Shai-Hulud Audit
        shell: bash
        run: |
          chmod +x ./shai-hulud-audit.sh
          ./shai-hulud-audit.sh --no-color --save-report || true

      # 4. Publish to Public NPM
      # NOTE: On vérifie le chemin 'dist/ngx-toast' ou 'dist/@aminekun90/ngx-toast'
      - name: 🚀 Publish to NPM
        run: |
          VERSION="${{ steps.package.outputs.version }}"
          PACKAGE="@aminekun90/ngx-toast"
          # Check if version exists on npm
          if npm view "$PACKAGE@$VERSION" > /dev/null 2>&1; then
            echo "✅ Version $VERSION already exists on npm, skipping publish."
          else
            echo "🚀 Publishing $PACKAGE@$VERSION to npm..."
            npm publish ./dist/ngx-toast --provenance --access public --ignore-scripts
          fi

      - name: 🏷️ Create GitHub Release
        if: success()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.package.outputs.version }}
        run: |
          if gh release view "v$VERSION" >/dev/null 2>&1; then
            echo "✅ GitHub release v$VERSION already exists, skipping."
          else
            gh release create "v$VERSION" \
              --title "v$VERSION" \
              --generate-notes \
              --target "main"
          fi

      # 6. Publish to GitHub Packages
      - name: 📦 Publish to GitHub Packages
        if: success()
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PACKAGE="@aminekun90/ngx-toast"
          VERSION="${{ steps.package.outputs.version }}"
          REGISTRY="https://npm.pkg.github.com"

          # Check if version exists on GitHub Packages
          if npm view "$PACKAGE@$VERSION" --registry $REGISTRY > /dev/null 2>&1; then
            echo "✅ Version $VERSION already exists on GitHub Packages, skipping publish."
          else
            echo "🚀 Publishing $PACKAGE@$VERSION to GitHub Packages..."

            npm config set @aminekun90:registry $REGISTRY
            npm config set //npm.pkg.github.com/:_authToken "${NODE_AUTH_TOKEN}"

            npm publish ./dist/ngx-toast \
              --registry $REGISTRY \
              --ignore-scripts
          fi